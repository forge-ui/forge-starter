name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        env:
          # 默认 GITHUB_TOKEN 对跨仓库的 private packages 没访问权。
          # PACKAGES_TOKEN 是一个有 read:packages scope 的 PAT，配在 repo secrets 里。
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Build (static export)
        env:
          GITHUB_PAGES: "true"
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
